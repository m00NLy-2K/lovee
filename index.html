<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галактика нашей любви</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020004; /* Ультра-темный космос */
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            user-select: none;
            touch-action: none; /* Чтобы телефон не скроллил страницу при вращении */
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        /* Контейнер для летающих надписей */
        .text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Пропускаем клики мимо кнопок к холсту */
        }

        .floating-text {
            position: absolute;
            pointer-events: auto;
            cursor: pointer;
            color: #ffb6c1;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff00ff;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .floating-text:hover {
            color: #fff;
            transform: scale(1.2) !important;
            text-shadow: 0 0 20px #fff, 0 0 30px #ff1493;
        }

        /* Координаты и анимация надписей (7 карточек) */
        .t1 { top: 58%; left: 8%;  animation: floatUI 6s infinite ease-in-out; }
        .t2 { top: 38%; right: 10%; animation: floatUI 5s infinite ease-in-out 1s; }
        .t3 { top: 78%; left: 30%; animation: floatUI 7s infinite ease-in-out 2s; }
        .t4 { top: 24%; left: 15%; animation: floatUI 6s infinite ease-in-out 0.5s; }
        .t5 { top: 66%; right: 12%; animation: floatUI 5.5s infinite ease-in-out 1.5s; }
        .t6 { top: 46%; left: 38%; animation: floatUI 6.5s infinite ease-in-out 0.8s; }
        .t7 { top: 85%; right: 28%; animation: floatUI 5.8s infinite ease-in-out 2.2s; }

        @keyframes floatUI {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* Заголовок */
        .main-title {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ff1493;
            z-index: 2;
            pointer-events: none;
            animation: pulseText 3s infinite alternate;
        }

        /* Инструкция внизу */
        .hint {
            position: absolute;
            bottom: 3%;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes pulseText {
            0% { opacity: 0.8; }
            100% { opacity: 1; text-shadow: 0 0 25px #ff1493, 0 0 40px #ffb6c1; }
        }

        /* Всплывающее окно (Карточка) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            background: #110515;
            border: 1px solid rgba(255, 20, 147, 0.3);
            border-radius: 20px;
            padding: 20px;
            width: 320px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
            transform: translateY(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-image {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #ffb6c1;
        }

        .modal-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #ddd;
        }

        .close-btn {
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid #ff1493;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: #ff1493;
            box-shadow: 0 0 15px #ff1493;
        }
    </style>
</head>
<body>

    <div class="main-title">Галактика нашей любви ❤️</div>
    <div class="hint">Покрути галактику пальцем или мышкой ✨</div>

    <canvas id="canvas"></canvas>

    <div class="text-container">
        <div class="floating-text t1" onclick="openCard(0)"> Моя вселенная</div>
        <div class="floating-text t2" onclick="openCard(1)"> Навсегда</div>
        <div class="floating-text t3" onclick="openCard(2)"> Мое счастье</div>
        <div class="floating-text t4" onclick="openCard(3)">С годовщиной!</div>
        <div class="floating-text t5" onclick="openCard(4)">Любовь всей жизни</div>
        <div class="floating-text t6" onclick="openCard(5)"> Наш путь</div>
        <div class="floating-text t7" onclick="openCard(6)"> Ты мое всё</div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeCard(event)">
        <div class="modal-card" id="modalCard">
            <div id="mediaContainer"></div> 
            <div class="modal-title" id="mTitle">Заголовок</div>
            <div class="modal-text" id="mText">Текст</div>
            <button class="close-btn" onclick="closeCardForce()">Вернуться ❤️</button>
        </div>
    </div>

    <script>
        // ============================================================
        // --- ДАННЫЕ ДЛЯ КАРТОЧЕК: РЕДАКТИРУЙТЕ ТОЛЬКО ЭТОТ БЛОК ---
        // Каждый объект = одна карточка (в том же порядке, что t1..t7 выше)
        //   title  — заголовок карточки
        //   text   — короткое послание (1-3 предложения)
        //   image  — ссылка на фото/гифку ИЛИ ВИДЕО. Можно:
        //            а) вставить прямую ссылку на картинку в интернете
        //            б) положить файл фото рядом с этим index.html (например "photo1.jpg")
        //            в) положить ВИДЕО рядом (например "video.mp4") - код сам его запустит!
        // ============================================================
        const cardsData = [
            {
                title: "Моя вселенная",
                text: "С того дня, как мы встретились, ты стала центром моей галактики. Люблю тебя бесконечно!",
                image: "love1.mp4" // <-- замените на своё фото или видео (например "vid1.mp4")
            },
            {
                title: "Навсегда вместе",
                text: "Каждый миг рядом с тобой — это магия. Спасибо, что ты есть у меня.",
                image: "life1.jpg" 
            },
            {
                title: "Мое счастье",
                text: "Ты делаешь меня самым счастливым человеком в этой вселенной. С нашей годовщиной!",
                image: "life2.jpg" 
            },
            {
                title: "С годовщиной!",
                text: "Столько всего пройдено, а впереди еще целая вечность. Я всегда буду рядом.",
                image: "life3.jpg" 
            },
            {
                title: "Любовь всей жизни",
                text: "Нет слов, чтобы описать, как сильно я тебя люблю. Мой лучший друг и моя душа.",
                image: "love2.mp4" 
            },
            {
                title: "Наш путь",
                text: "Сколько бы дорог мы ни прошли, я рад, что каждая из них вела меня к тебе.",
                image: "life4.jpg" 
            },
            {
                title: "Ты моё всё",
                text: "Ты не просто часть моей жизни — ты то, ради чего она имеет смысл.",
                image: "life5.jpg" 
            }
        ];

        // --- ЛОГИКА ВСПЛЫВАЮЩИХ ОКОН (УМНЫЙ МЕДИА-КОНТЕЙНЕР) ---
        const modal = document.getElementById('modalOverlay');
        const mediaContainer = document.getElementById('mediaContainer');
        const mTitle = document.getElementById('mTitle');
        const mText = document.getElementById('mText');

        function openCard(index) {
            const data = cardsData[index];
            const fileUrl = data.image.toLowerCase();
            
            // Теперь код понимает форматы .mp4, .mov и .webm
            if (fileUrl.includes('.mp4') || fileUrl.includes('.mov') || fileUrl.includes('.webm')) {
                mediaContainer.innerHTML = `<video src="${data.image}" class="modal-image" autoplay loop muted playsinline></video>`;
            } else {
                mediaContainer.innerHTML = `<img src="${data.image}" class="modal-image" alt="love" onerror="this.style.display='none'">`;
            }

            mTitle.innerText = data.title;
            mText.innerText = data.text;
            modal.classList.add('active');
        }

        function closeCard(e) {
            if (e.target === modal) modal.classList.remove('active');
        }
        function closeCardForce() {
            modal.classList.remove('active');
        }


        // --- НАСТОЯЩИЙ 3D ДВИЖОК ГАЛАКТИКИ ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, cx, cy;

        // Переменные вращения камеры (управляются мышкой/пальцем)
        let pitch = 1.0; // Наклон вперед/назад (ось X)
        let yaw = 0;     // Вращение влево/вправо (ось Y)
        let autoYaw = 0; // Автоматическое вращение

        let isDragging = false;
        let lastX, lastY;

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cx = w / 2;
            cy = h / 2 + 50; 
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        // 3D Математика: функция поворота координат
        function rotate3D(x, y, z, pPitch, pYaw) {
            let y1 = y * Math.cos(pPitch) - z * Math.sin(pPitch);
            let z1 = y * Math.sin(pPitch) + z * Math.cos(pPitch);
            
            let x2 = x * Math.cos(pYaw) - z1 * Math.sin(pYaw);
            let z2 = x * Math.sin(pYaw) + z1 * Math.cos(pYaw);
            
            return { x: x2, y: y1, z: z2 };
        }

        // Генерация галактики
        const galaxy = [];
        const numStars = 4000; 
        const maxRadius = w > 800 ? 600 : 350;
        const colors = ['#ff1493', '#ff00ff', '#ff69b4', '#ffffff', '#8a2be2'];

        for(let i = 0; i < numStars; i++) {
            let radius = Math.pow(Math.random(), 2) * maxRadius; 
            
            let numArms = 3;
            let armOffset = (Math.random() * 0.4 - 0.2); 
            let angle = (radius * 0.015) + (Math.floor(Math.random() * numArms) * ((Math.PI * 2) / numArms)) + armOffset;
            
            let x = Math.cos(angle) * radius;
            let z = Math.sin(angle) * radius;
            let thickness = (maxRadius - radius) * 0.1;
            let y = (Math.random() - 0.5) * thickness;

            galaxy.push({
                x: x, y: y, z: z,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 1.5 + 0.5
            });
        }

        // Генерация 3D Сердца
        const heartParticles = [];
        for (let t = 0; t < Math.PI * 2; t += 0.05) {
            let hx = 16 * Math.pow(Math.sin(t), 3);
            let hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            let scale = w > 800 ? 10 : 7;
            
            for(let j = 0; j < 3; j++) {
                heartParticles.push({
                    x: hx * scale + (Math.random()-0.5)*5, 
                    y: hy * scale - (w > 800 ? 250 : 150) + (Math.random()-0.5)*5, 
                    z: (Math.random()-0.5)*5,
                    color: Math.random() > 0.5 ? '#ff1493' : '#ffb6c1',
                    size: Math.random() * 2 + 1
                });
            }
        }

        let beamParticles = [];

        // Главный цикл анимации
        function animate() {
            ctx.fillStyle = 'rgba(2, 0, 4, 0.4)';
            ctx.fillRect(0, 0, w, h);

            autoYaw += 0.001; 
            let currentYaw = yaw + autoYaw;

            let renderList = [];

            // 1. Считаем позицию звезд галактики
            galaxy.forEach(p => {
                let pos = rotate3D(p.x, p.y, p.z, pitch, currentYaw);
                let zScale = 1000 / (1000 + pos.z);
                if (zScale > 0) {
                    renderList.push({ pos, zScale, color: p.color, size: p.size, type: 'star' });
                }
            });

            // 2. Черная дыра (центр)
            let bhPos = rotate3D(0, 0, 0, pitch, currentYaw);
            renderList.push({ pos: bhPos, zScale: 1000/(1000+bhPos.z), type: 'blackhole' });

            // 3. Сердце 
            heartParticles.forEach(p => {
                let pos = rotate3D(p.x, p.y, p.z, pitch, 0); 
                let zScale = 1000 / (1000 + pos.z);
                if (zScale > 0) {
                    renderList.push({ pos, zScale, color: p.color, size: p.size, type: 'heart' });
                }
            });

            // Луч от центра к сердцу
            if(Math.random() > 0.5) {
                beamParticles.push({
                    x: (Math.random() - 0.5) * 15,
                    y: 0,
                    z: (Math.random() - 0.5) * 15,
                    speedY: -Math.random() * 4 - 2,
                    life: 1
                });
            }
            for (let i = beamParticles.length - 1; i >= 0; i--) {
                let p = beamParticles[i];
                p.y += p.speedY;
                p.life -= 0.015;
                if (p.life <= 0) {
                    beamParticles.splice(i, 1);
                    continue;
                }
                let pos = rotate3D(p.x, p.y, p.z, pitch, 0);
                let zScale = 1000 / (1000 + pos.z);
                renderList.push({ pos, zScale, color: `rgba(255, 20, 147, ${p.life})`, size: 2, type: 'beam' });
            }

            // СОРТИРУЕМ ВСЕ ЭЛЕМЕНТЫ ОТ ДАЛЬНИХ К БЛИЖНИМ 
            renderList.sort((a, b) => b.pos.z - a.pos.z);

            // ОТРИСОВКА
            renderList.forEach(item => {
                let sx = cx + item.pos.x * item.zScale;
                let sy = cy + item.pos.y * item.zScale;

                if (item.type === 'blackhole') {
                    ctx.beginPath();
                    let radiusX = 40 * item.zScale;
                    let radiusY = 40 * item.zScale * Math.cos(pitch); 
                    ctx.ellipse(sx, sy, Math.abs(radiusX), Math.abs(radiusY), 0, 0, Math.PI*2);
                    ctx.fillStyle = 'black';
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#ff1493';
                    ctx.fill();
                    ctx.shadowBlur = 0; 
                } else {
                    ctx.beginPath();
                    ctx.arc(sx, sy, item.size * item.zScale, 0, Math.PI * 2);
                    ctx.fillStyle = item.color;
                    
                    if(item.type === 'heart') {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#ff1493';
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        // --- УПРАВЛЕНИЕ МЫШКОЙ И КАСАНИЯМИ ---
        
        function startDrag(e) {
            if(e.target.closest('.floating-text') || e.target.closest('.modal-overlay')) return;
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            lastX = clientX;
            lastY = clientY;
        }

        function drag(e) {
            if(!isDragging) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let dx = clientX - lastX;
            let dy = clientY - lastY;
            
            yaw -= dx * 0.005; 
            pitch -= dy * 0.005; 
            
            pitch = Math.max(0.1, Math.min(Math.PI / 2.2, pitch));
            
            lastX = clientX;
            lastY = clientY;
        }

        function endDrag() {
            isDragging = false;
        }

        document.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', endDrag);

        document.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('touchend', endDrag);

    </script>
</body>
</html>
